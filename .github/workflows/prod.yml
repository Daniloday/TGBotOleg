name: Prod Deploy

on:
  push:
    branches:
      - prod

permissions:
  contents: read

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Docker tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build test image
        run: docker build -t tgbotoleg:test .

      - name: Run tests
        run: docker run --rm tgbotoleg:test python -m unittest discover -s tests

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          set -euo pipefail

          deploy_path="${{ secrets.VPS_DEPLOY_PATH }}"
          repo_url="https://github.com/Daniloday/TGBotOleg.git"

          mkdir -p "$deploy_path"
          cd "$deploy_path"

          if [ ! -d .git ]; then
            git init
            git remote add origin "$repo_url"
          fi

          git fetch origin prod
          git checkout -B prod origin/prod
          git reset --hard origin/prod

          docker compose up -d --build
          docker image prune -f
          EOF
